[build]
  command = "npm run build"
  publish = "dist/client"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  included_files = ["dist/server/**"]

# All requests that don't match a static file in dist/client fall through
# to the SSR Netlify Function, which serves TanStack Start routes.
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server"
  status = 200
